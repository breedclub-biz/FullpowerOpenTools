name: Update Judge QA Data

on:
  schedule:
    - cron: '0 18 * * 0'   # 毎週日曜 18:00 UTC（月曜 3:00 JST）
    - cron: '0 19 1 * *'   # 毎月 1日 19:00 UTC（2日 4:00 JST）
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (weekly=追加のみ / monthly=変更・削除も)'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 19 1 * *" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=weekly" >> $GITHUB_OUTPUT
          fi

      - name: Run differential scraper
        run: python judge-qa/scrape_diff.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add judge-qa/qa_data_fixed.json judge-qa/card_names.json judge-qa/data_meta.json
          git diff --staged --quiet || git commit -m "QAデータ更新 (${{ steps.mode.outputs.mode }}) $(date '+%Y-%m-%d')"
          git push
