<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARD SHOP FULLPOWER｜デュエルマスターズ専門カードショップ</title>
  <meta name="description" content="CARD SHOP FULLPOWER 秋葉原店 公式サイト。高額買取情報・在庫情報をご案内。">
  <style>
    :root {
      --black: #0a0a0a;
      --gray-900: #222222;
      --gray-700: #555555;
      --gray-500: #888888;
      --gray-100: #f5f5f5;
      --white: #ffffff;
      --accent: #FF5797;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Tahoma', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
      background: var(--white);
      color: var(--gray-900);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px 32px;
      text-align: center;
    }
    .hero-logo {
      max-width: 560px;
      width: 100%;
      height: auto;
      margin-bottom: 32px;
    }
    .hero-tagline {
      font-size: 14px;
      letter-spacing: 6px;
      color: var(--gray-500);
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .hero-jp {
      font-size: 20px;
      color: var(--gray-700);
      margin-bottom: 56px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      max-width: 720px;
      width: 100%;
    }
    .menu-card {
      display: block;
      background: var(--white);
      color: var(--gray-900);
      text-decoration: none;
      padding: 36px 110px 36px 32px;
      border: 2px solid var(--gray-900);
      transition: all 0.15s;
      position: relative;
    }
    .menu-card:hover {
      background: var(--gray-900);
      color: var(--white);
    }
    .menu-card.disabled {
      border-color: var(--gray-300, #ccc);
      color: var(--gray-500);
      pointer-events: none;
      cursor: not-allowed;
    }
    .menu-card-label {
      font-size: 12px;
      letter-spacing: 3px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .menu-card.disabled .menu-card-label {
      color: var(--gray-500);
    }
    .menu-card-title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: 1px;
      line-height: 1.2;
    }
    .menu-card-desc {
      font-size: 15px;
      color: var(--gray-700);
    }
    .menu-card:hover .menu-card-desc {
      color: var(--gray-300, #ccc);
    }
    .menu-card-arrow {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      font-weight: 700;
    }
    .menu-card.disabled .menu-card-arrow {
      display: none;
    }
    .menu-card-soon {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gray-500);
      border: 1px solid var(--gray-500);
      padding: 4px 10px;
      white-space: nowrap;
    }

    .footer {
      background: var(--black);
      color: var(--gray-500);
      text-align: center;
      padding: 32px 24px;
      font-size: 12px;
    }
    .footer-name {
      font-weight: 700;
      color: var(--white);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .footer-info {
      font-size: 11px;
      line-height: 1.8;
    }

    @media (max-width: 640px) {
      .hero { padding: 48px 20px 24px; }
      .hero-logo { max-width: 360px; margin-bottom: 24px; }
      .hero-jp { font-size: 16px; margin-bottom: 40px; }
      .menu-card { padding: 28px 100px 28px 22px; }
      .menu-card-title { font-size: 24px; }
      .menu-card-desc { font-size: 14px; }
      .menu-card-arrow, .menu-card-soon { right: 18px; }
      .menu-card-arrow { font-size: 20px; }
    }
  </style>
</head>
<body>

  <main class="hero">
    <img src="logo.png" alt="CARD SHOP FULLPOWER" class="hero-logo">
    <p class="hero-tagline">Card Shop</p>
    <p class="hero-jp">デュエルマスターズ専門カードショップ・秋葉原</p>

    <nav class="menu">
      <a class="menu-card" href="kaitori/">
        <p class="menu-card-label">Buy</p>
        <h2 class="menu-card-title">買取情報</h2>
        <p class="menu-card-desc">高額買取カード一覧はこちら</p>
        <span class="menu-card-arrow">&rarr;</span>
      </a>
      <a class="menu-card disabled" aria-disabled="true">
        <p class="menu-card-label">Stock</p>
        <h2 class="menu-card-title">在庫情報</h2>
        <p class="menu-card-desc">店頭在庫の検索・閲覧</p>
        <span class="menu-card-soon">Coming Soon</span>
      </a>
    </nav>
  </main>

  <footer class="footer">
    <p class="footer-name">CARD SHOP FULLPOWER 秋葉原店</p>
    <p class="footer-info">
      平日 15:00&ndash;21:00 / 土日祝 12:00&ndash;21:00
    </p>
  </footer>

</body>
</html>
